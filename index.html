<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EightbornV | Live Pro Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050506;
            --card-bg: #0f0f12;
            --accent: #ff0000;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            padding: 30px;
        }

        .header {
            max-width: 1800px;
            margin: 0 auto 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 15px;
        }

        .brand h1 { font-size: 1.8rem; font-weight: 800; }
        .brand h1 span { color: var(--accent); }

        /* Yan yana 5 kanal düzeni */
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(18%, 1fr));
            gap: 15px;
            max-width: 1800px;
            margin: 0 auto;
        }

        .stream-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
            transition: transform 0.3s ease;
            position: relative;
            cursor: pointer;
        }

        .stream-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
        }

        .media-container {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
        }

        /* Görsel ve Video Katmanları */
        .thumb-img, .video-overlay {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        .video-overlay {
            z-index: 0;
            opacity: 0;
            transition: opacity 0.5s ease;
            pointer-events: none;
        }

        .stream-card:hover .video-overlay {
            opacity: 1;
            z-index: 2;
        }

        .stream-card:hover .thumb-img {
            opacity: 0;
        }

        .live-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            background: var(--accent);
            color: white;
            font-size: 10px;
            font-weight: 800;
            padding: 3px 7px;
            border-radius: 4px;
            z-index: 4;
        }

        .card-info { padding: 12px; }
        .channel-name { display: block; font-weight: 700; font-size: 0.9rem; color: var(--accent); }
        .stream-title { font-size: 0.75rem; color: var(--text-dim); margin-top: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        iframe { width: 100%; height: 100%; border: none; }

        @media (max-width: 1400px) { .container { grid-template-columns: repeat(auto-fill, minmax(23%, 1fr)); } }
        @media (max-width: 1000px) { .container { grid-template-columns: repeat(auto-fill, minmax(45%, 1fr)); } }
    </style>
</head>
<body>

    <header class="header">
        <div class="brand"><h1><span>EIGHTBORN</span> LIVE</h1></div>
        <div id="count-box" style="font-size: 0.8rem; color: var(--text-dim);">Yayıncılar taranıyor...</div>
    </header>

    <div class="container" id="stream-grid"></div>

    <script>
        const API_KEY = 'AIzaSyASaDuIpz0w0ZRVGvjXewLkCO5HDqw9e3I';
        const QUERY = 'EightbornV OR "EightbornV Next" OR #eightbornv';

        async function loadStreams() {
            const grid = document.getElementById('stream-grid');
            
            try {
                const response = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&eventType=live&type=video&q=${encodeURIComponent(QUERY)}&key=${API_KEY}&maxResults=15&order=viewCount`);
                const data = await response.json();

                if (data.items) {
                    grid.innerHTML = '';
                    document.getElementById('count-box').innerText = `${data.items.length} Kanal Aktif`;
                    
                    data.items.forEach(item => {
                        const videoId = item.id.videoId;
                        const channelTitle = item.snippet.channelTitle;
                        const title = item.snippet.title;
                        const thumb = item.snippet.thumbnails.high.url;

                        const card = `
                            <div class="stream-card" onmouseenter="playVideo('${videoId}')" onmouseleave="stopVideo('${videoId}')" onclick="window.open('https://youtube.com/watch?v=${videoId}')">
                                <div class="media-container">
                                    <div class="live-badge">CANLI</div>
                                    <img src="${thumb}" class="thumb-img" id="img-${videoId}">
                                    <div class="video-overlay" id="player-${videoId}">
                                        </div>
                                </div>
                                <div class="card-info">
                                    <span class="channel-name">${channelTitle}</span>
                                    <p class="stream-title">${title}</p>
                                </div>
                            </div>
                        `;
                        grid.insertAdjacentHTML('beforeend', card);
                    });
                }
            } catch (e) {
                grid.innerHTML = "Hata: API Kotası veya Bağlantı Sorunu.";
            }
        }

        function playVideo(id) {
            const container = document.getElementById(`player-${id}`);
            // YouTube Player'ı sessiz ve otomatik başlatma modunda yükle
            container.innerHTML = `<iframe src="https://www.youtube.com/embed/${id}?autoplay=1&mute=1&controls=0&modestbranding=1&rel=0" allow="autoplay; encrypted-media"></iframe>`;
        }

        function stopVideo(id) {
            const container = document.getElementById(`player-${id}`);
            container.innerHTML = ''; // IFrame'i kaldırarak videoyu durdur ve trafiği kes
        }

        loadStreams();
    </script>
</body>
</html>
