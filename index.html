<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EightbornV | Live Pro Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --card-bg: #121214;
            --accent: #ff0000;
            --accent-rgb: 255, 0, 0;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
            --radius: 14px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            padding: 40px;
            min-height: 100vh;
        }

        /* Header */
        .header {
            max-width: 1700px;
            margin: 0 auto 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand h1 {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -2px;
            text-transform: uppercase;
        }

        .brand h1 span { color: var(--accent); }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.03);
            padding: 10px 20px;
            border-radius: 100px;
            border: 1px solid var(--border);
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--text-dim);
        }

        .dot {
            width: 10px; height: 10px; background: var(--accent);
            border-radius: 50%; box-shadow: 0 0 12px var(--accent);
            animation: pulse 2s infinite;
        }

        /* Grid Sistemi */
        .container {
            display: grid;
            grid-template-columns: repeat(5, 1fr); /* Yan yana kesin 5 kanal */
            gap: 20px;
            max-width: 1700px;
            margin: 0 auto;
        }

        /* Kart Tasarımı ve Popup Efekti */
        .stream-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            position: relative;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            cursor: pointer;
            z-index: 1;
        }

        .stream-card:hover {
            z-index: 99;
            transform: scale(1.18); /* Hover'da büyük popup etkisi */
            border-color: var(--accent);
            box-shadow: 0 30px 60px rgba(0,0,0,0.9), 0 0 30px rgba(var(--accent-rgb), 0.2);
        }

        /* Medya Alanı */
        .media-box {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            border-radius: var(--radius) var(--radius) 0 0;
            overflow: hidden;
        }

        .thumb-img {
            width: 100%; height: 100%; object-fit: cover;
            transition: 0.3s;
        }

        .video-container {
            position: absolute; inset: 0;
            opacity: 0; pointer-events: none;
            transition: 0.4s ease-in-out;
        }

        .stream-card:hover .video-container {
            opacity: 1; pointer-events: auto;
        }

        .stream-card:hover .thumb-img {
            filter: brightness(0.3);
        }

        /* Badge */
        .live-label {
            position: absolute; top: 12px; left: 12px;
            background: var(--accent); color: white;
            font-size: 10px; font-weight: 900; padding: 4px 10px;
            border-radius: 6px; z-index: 10;
        }

        /* Kart Alt Bilgi */
        .card-info { padding: 18px; }

        .ch-title {
            display: block; font-weight: 800; font-size: 1rem;
            margin-bottom: 6px; color: var(--text-main);
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }

        .stream-desc {
            font-size: 0.8rem; color: var(--text-dim);
            line-height: 1.4; display: -webkit-box;
            -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
        }

        iframe { width: 100%; height: 100%; border: none; }

        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.5; }
            50% { transform: scale(1); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.5; }
        }

        /* Duyarlılık */
        @media (max-width: 1500px) { .container { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 1100px) { .container { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 600px) { .container { grid-template-columns: 1fr; padding: 10px; } }
    </style>
</head>
<body>

    <header class="header">
        <div class="brand"><h1><span>Eightborn</span> Live</h1></div>
        <div class="status-badge">
            <div class="dot"></div>
            <span id="live-count">Taranıyor...</span>
        </div>
    </header>

    <div class="container" id="stream-grid">
        </div>

    <script>
        const API_CONFIG = {
            key: 'AIzaSyASaDuIpz0w0ZRVGvjXewLkCO5HDqw9e3I',
            search: 'EightbornV OR "EightbornV Next" OR #eightbornv',
            cacheDuration: 300000 // 5 Dakika (Kota dostu)
        };

        async function init() {
            const grid = document.getElementById('stream-grid');
            
            // Cache Kontrolü
            const cachedTime = localStorage.getItem('eb_time');
            const cachedData = localStorage.getItem('eb_data');
            const isFresh = cachedTime && (Date.now() - cachedTime < API_CONFIG.cacheDuration);

            if (isFresh && cachedData) {
                render(JSON.parse(cachedData));
                console.log("Veri önbellekten yüklendi.");
                return;
            }

            try {
                const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&eventType=live&type=video&q=${encodeURIComponent(API_CONFIG.search)}&key=${API_CONFIG.key}&maxResults=15&order=viewCount`;
                const res = await fetch(url);
                const data = await res.json();

                if (data.items) {
                    localStorage.setItem('eb_data', JSON.stringify(data.items));
                    localStorage.setItem('eb_time', Date.now().toString());
                    render(data.items);
                }
            } catch (err) {
                grid.innerHTML = `<p style="grid-column: 1/-1; text-align: center; color: var(--text-dim);">Sistem şu an meşgul (API Limit). Lütfen biraz sonra deneyin.</p>`;
            }
        }

        function render(items) {
            const grid = document.getElementById('stream-grid');
            const counter = document.getElementById('live-count');
            grid.innerHTML = '';
            counter.innerText = `${items.length} Yayıncı Aktif`;

            items.forEach(item => {
                const vid = item.id.videoId;
                const snippet = item.snippet;
                const html = `
                    <div class="stream-card" 
                         onmouseenter="playVideo('${vid}')" 
                         onmouseleave="stopVideo('${vid}')" 
                         onclick="window.open('https://youtube.com/watch?v=${vid}', '_blank')">
                        <div class="media-box">
                            <div class="live-label">LIVE</div>
                            <img src="${snippet.thumbnails.high.url}" class="thumb-img">
                            <div class="video-container" id="box-${vid}"></div>
                        </div>
                        <div class="card-info">
                            <span class="ch-title">${snippet.channelTitle}</span>
                            <p class="stream-desc">${snippet.title}</p>
                        </div>
                    </div>
                `;
                grid.insertAdjacentHTML('beforeend', html);
            });
        }

        function playVideo(id) {
            const div = document.getElementById(`box-${id}`);
            // Sessiz başlatma (Autoplay kuralı gereği)
            div.innerHTML = `<iframe src="https://www.youtube.com/embed/${id}?autoplay=1&mute=1&controls=0&modestbranding=1&iv_load_policy=3" allow="autoplay"></iframe>`;
        }

        function stopVideo(id) {
            const div = document.getElementById(`box-${id}`);
            div.innerHTML = ''; // IFrame'i yok et, kaynakları serbest bırak
        }

        init();
    </script>
</body>
</html>
