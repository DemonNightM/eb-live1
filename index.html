<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EightbornV Canlı Yayınlar</title>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --card-bg: #1a1a1a;
            --border-red: #ff3e3e;
            --text-white: #ffffff;
            --text-gray: #b0b0b0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-white);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            max-width: 1300px;
            width: 100%;
        }

        .card {
            background: var(--card-bg);
            border: 2px solid var(--border-red);
            border-radius: 12px;
            padding: 15px;
            position: relative;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 15px rgba(255, 62, 62, 0.3);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .username {
            font-weight: bold;
            font-size: 1.1rem;
        }

        .live-badge {
            background: var(--border-red);
            color: white;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .thumbnail-container {
            width: 100%;
            position: relative;
            aspect-ratio: 16 / 9;
            overflow: hidden;
            border-radius: 8px;
            background: #000;
        }

        .thumbnail {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-body {
            margin-top: 12px;
        }

        .stream-title {
            font-size: 0.9rem;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .tags {
            font-size: 0.8rem;
            color: var(--text-gray);
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* Yükleniyor animasyonu için */
        .loading {
            text-align: center;
            grid-column: 1 / -1;
            padding: 50px;
        }
    </style>
</head>
<body>

    <div class="container" id="stream-container">
        <div class="loading">Yayıncılar yükleniyor...</div>
    </div>

    <script>
        // ÖRNEK VERİLER (API bağlayana kadar görüntüyü test etmeniz için)
        const demoStreams = [
            { user_name: "Nilay", title: "Canlı | Veronica Valenti | EightbornV Next | Bölüm 314", thumbnail: "https://picsum.photos/seed/1/400/225", tags: "#eightbornv #8born" },
            { user_name: "wo1ww", title: "SELAM LAR | Fabien FORTUNE | EightbornV | #eightbornv", thumbnail: "https://picsum.photos/seed/2/400/225", tags: "#eightbornv #8born" },
            { user_name: "Yusif Safarov", title: "ÇAVUŞ ACUN DÖNMEZ | NE İŞŞ GELDİK | EightbornV Next", thumbnail: "https://picsum.photos/seed/3/400/225", tags: "#LSPD #Beta" },
            { user_name: "Valiancys", title: "CANLI | LSPD VALIAN MILLER | #eightbornv next #131", thumbnail: "https://picsum.photos/seed/4/400/225", tags: "#eightbornnext" }
        ];

        async function fetchStreams() {
            const container = document.getElementById('stream-container');
            
            /* NOT: Gerçek Twitch verisi için buraya bir fetch isteği eklemelisiniz.
               Twitch API Client ID ve Bearer Token gereklidir.
            */
            
            try {
                // Şimdilik demo verileri basıyoruz:
                renderStreams(demoStreams);
            } catch (error) {
                container.innerHTML = "Veri çekilirken bir hata oluştu.";
            }
        }

        function renderStreams(streams) {
            const container = document.getElementById('stream-container');
            container.innerHTML = ''; // Temizle

            streams.forEach(stream => {
                const card = `
                    <a href="https://twitch.tv/${stream.user_name}" target="_blank">
                        <div class="card">
                            <div class="card-header">
                                <span class="username">${stream.user_name}</span>
                                <span class="live-badge">CANLI</span>
                            </div>
                            <div class="thumbnail-container">
                                <img src="${stream.thumbnail}" class="thumbnail" alt="thumbnail">
                            </div>
                            <div class="card-body">
                                <div class="stream-title">${stream.title}</div>
                                <div class="tags">${stream.tags}</div>
                            </div>
                        </div>
                    </a>
                `;
                container.innerHTML += card;
            });
        }

        // Sayfa yüklendiğinde çalıştır
        fetchStreams();
    </script>
</body>
</html>
