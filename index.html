<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EightbornV Live Tracker</title>
    <style>
        :root {
            --bg: #050505;
            --card-bg: #111111;
            --accent: #ff0000;
            --text-white: #ffffff;
            --text-gray: #aaaaaa;
        }

        body {
            background-color: var(--bg);
            color: var(--text-white);
            font-family: 'Inter', 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .header {
            text-align: center;
            padding: 40px 0;
            border-bottom: 3px solid var(--accent);
            margin-bottom: 40px;
            box-shadow: 0 10px 30px rgba(255, 0, 0, 0.1);
        }

        .header h1 {
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin: 0;
            color: var(--text-white);
            text-shadow: 2px 2px 10px rgba(255, 0, 0, 0.5);
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            max-width: 1500px;
            margin: 0 auto;
        }

        .stream-card {
            background: var(--card-bg);
            border: 1px solid #222;
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.3s ease;
            text-decoration: none;
            color: inherit;
            position: relative;
        }

        .stream-card:hover {
            transform: translateY(-10px);
            border-color: var(--accent);
            box-shadow: 0 15px 35px rgba(255, 0, 0, 0.2);
        }

        .thumb-box {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
        }

        .thumb-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .live-tag {
            position: absolute;
            top: 15px;
            right: 15px;
            background: var(--accent);
            color: white;
            padding: 5px 12px;
            font-weight: 800;
            font-size: 11px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 0 15px var(--accent);
        }

        .live-tag::before {
            content: '';
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
            animation: pulse 1s infinite;
        }

        .info {
            padding: 20px;
        }

        .channel-name {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 10px;
            display: block;
        }

        .title {
            font-size: 0.9rem;
            color: var(--text-gray);
            line-height: 1.4;
            height: 2.8em;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        #status-msg {
            text-align: center;
            grid-column: 1 / -1;
            padding: 50px;
            font-size: 1.2rem;
            color: var(--text-gray);
        }

        .refresh-btn {
            display: block;
            margin: 20px auto;
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }

        .refresh-btn:hover {
            background: var(--accent);
            color: white;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>EightbornV Live</h1>
    </div>

    <div class="container" id="stream-container">
        <div id="status-msg">Yayıncılar aranıyor, lütfen bekleyin...</div>
    </div>

    <button class="refresh-btn" onclick="fetchYouTubeStreams()">Listeyi Yenile</button>

    <script>
        // --- KONFİGÜRASYON ---
        const API_KEY = 'AIzaSyASaDuIpz0w0ZRVGvjXewLkCO5HDqw9e3I'; 
        // Sorguyu genişletiyoruz ki daha fazla sonuç bulsun
        const SEARCH_QUERY = 'EightbornV OR "EightbornV Next" OR #eightbornv OR #eightbornnext -Eğlence';

        async function fetchYouTubeStreams() {
            const container = document.getElementById('stream-container');
            const status = document.getElementById('status-msg');

            // API URL'si - eventType=live o an yayında olanları çeker
            const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&eventType=live&type=video&q=${encodeURIComponent(SEARCH_QUERY)}&key=${API_KEY}&maxResults=15&order=viewCount`;

            try {
                const response = await fetch(url);
                const data = await response.json();

                if (data.error) {
                    status.innerHTML = `Hata: ${data.error.message}<br><small>API anahtarını veya Google Cloud ayarlarını kontrol et.</small>`;
                    return;
                }

                if (data.items && data.items.length > 0) {
                    container.innerHTML = ''; // Temizle
                    
                    data.items.forEach(item => {
                        const cardHtml = `
                            <a href="https://www.youtube.com/watch?v=${item.id.videoId}" class="stream-card" target="_blank">
                                <div class="thumb-box">
                                    <div class="live-tag">CANLI</div>
                                    <img src="${item.snippet.thumbnails.high.url}" alt="thumb">
                                </div>
                                <div class="info">
                                    <span class="channel-name">${item.snippet.channelTitle}</span>
                                    <p class="title">${item.snippet.title}</p>
                                </div>
                            </a>
                        `;
                        container.insertAdjacentHTML('beforeend', cardHtml);
                    });
                } else {
                    status.innerText = 'Şu an EightbornV etiketiyle canlı yayın bulunamadı.';
                }
            } catch (error) {
                status.innerText = 'Bağlantı hatası oluştu.';
                console.error(error);
            }
        }

        // İlk açılışta çalıştır
        fetchYouTubeStreams();

        // Her 3 dakikada bir otomatik güncelle
        setInterval(fetchYouTubeStreams, 180000);
    </script>
</body>
</html>
