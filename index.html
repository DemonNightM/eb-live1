<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EightbornV | Canlı Yayın Paneli</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --card-bg: #151515;
            --accent: #ff0000;
            --accent-glow: rgba(255, 0, 0, 0.3);
            --text-main: #ffffff;
            --text-dim: #888888;
            --radius: 12px;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }

        .header {
            text-align: left;
            max-width: 1400px;
            margin: 20px auto 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 900;
            letter-spacing: -1px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header h1 span { color: var(--accent); }

        .live-count {
            background: rgba(255, 255, 255, 0.1);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            color: var(--text-dim);
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .stream-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            overflow: hidden;
            text-decoration: none;
            color: inherit;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
        }

        .stream-card:hover {
            transform: scale(1.02);
            border-color: var(--accent);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 0 15px var(--accent-glow);
            z-index: 2;
        }

        .thumb-container {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            overflow: hidden;
        }

        .thumb-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }

        .stream-card:hover .thumb-container img {
            transform: scale(1.1);
        }

        /* Video Hareket Efekti (Overlay) */
        .video-motion {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.05), transparent);
            background-size: 200% 200%;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .stream-card:hover .video-motion {
            opacity: 1;
            animation: moveShine 2s infinite linear;
        }

        @keyframes moveShine {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .live-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--accent);
            color: white;
            font-size: 10px;
            font-weight: 900;
            padding: 4px 8px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 5px;
            z-index: 3;
        }

        .live-badge::before {
            content: '';
            width: 6px;
            height: 6px;
            background: white;
            border-radius: 50%;
            animation: blink 0.8s infinite;
        }

        .info-panel {
            padding: 15px;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
        }

        .channel-info {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 5px;
        }

        .channel-name {
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--text-main);
        }

        .stream-title {
            font-size: 0.8rem;
            color: var(--text-dim);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        #loader-status {
            grid-column: 1 / -1;
            text-align: center;
            padding: 100px;
            color: var(--text-dim);
        }

        .refresh-notice {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #111;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 0.7rem;
            border: 1px solid #333;
            color: var(--text-dim);
        }
    </style>
</head>
<body>

    <div class="header">
        <h1><span>EIGHTBORNV</span> NEXT LIVE</h1>
        <div class="live-count" id="count-box">Bağlanıyor...</div>
    </div>

    <div class="container" id="main-grid">
        <div id="loader-status">Veriler güncelleniyor...</div>
    </div>

    <div class="refresh-notice">Otomatik güncelleme: 5 Dakika</div>

    <script>
        const CONFIG = {
            key: 'AIzaSyASaDuIpz0w0ZRVGvjXewLkCO5HDqw9e3I',
            query: 'EightbornV OR "EightbornV Next" OR #eightbornv OR #eightbornnext',
            cacheTime: 5 * 60 * 1000, // 5 Dakika (milisaniye)
            storageKey: 'eb_live_data',
            timeKey: 'eb_live_last_fetch'
        };

        async function fetchStreams() {
            const grid = document.getElementById('main-grid');
            const countBox = document.getElementById('count-box');
            
            const now = Date.now();
            const lastFetch = localStorage.getItem(CONFIG.timeKey);
            const cachedData = localStorage.getItem(CONFIG.storageKey);

            // Önbellek Kontrolü (API Kotasını Korumak İçin)
            if (lastFetch && cachedData && (now - lastFetch < CONFIG.cacheTime)) {
                renderUI(JSON.parse(cachedData));
                console.log("Veri önbellekten getirildi.");
                return;
            }

            try {
                const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&eventType=live&type=video&q=${encodeURIComponent(CONFIG.query)}&key=${CONFIG.key}&maxResults=20&order=viewCount`;
                const response = await fetch(url);
                const data = await response.json();

                if (data.items) {
                    localStorage.setItem(CONFIG.storageKey, JSON.stringify(data.items));
                    localStorage.setItem(CONFIG.timeKey, now.toString());
                    renderUI(data.items);
                } else {
                    grid.innerHTML = '<div id="loader-status">Aktif yayın bulunamadı.</div>';
                }
            } catch (err) {
                grid.innerHTML = '<div id="loader-status">API Hatası veya Kota Dolu.</div>';
            }
        }

        function renderUI(streams) {
            const grid = document.getElementById('main-grid');
            const countBox = document.getElementById('count-box');
            
            grid.innerHTML = '';
            countBox.innerText = `${streams.length} Canlı Yayın`;

            streams.forEach(stream => {
                const html = `
                    <a href="https://www.youtube.com/watch?v=${stream.id.videoId}" class="stream-card" target="_blank">
                        <div class="thumb-container">
                            <div class="live-badge">CANLI</div>
                            <div class="video-motion"></div>
                            <img src="${stream.snippet.thumbnails.high.url}" alt="thumbnail">
                        </div>
                        <div class="info-panel">
                            <div class="channel-info">
                                <span class="channel-name">${stream.snippet.channelTitle}</span>
                            </div>
                            <div class="stream-title">${stream.snippet.title}</div>
                        </div>
                    </a>
                `;
                grid.insertAdjacentHTML('beforeend', html);
            });
        }

        // Başlat
        fetchStreams();
        
        // Periyodik kontrol
        setInterval(fetchStreams, 60000); // Her dakika kontrol et (ama cache varsa API'ye gitmez)
    </script>
</body>
</html>
