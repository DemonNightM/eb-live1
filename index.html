<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EightbornV | Ultra Live Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030303;
            --card-bg: #0d0d0f;
            --accent: #ff0000;
            --accent-glow: rgba(255, 0, 0, 0.4);
            --text-main: #ffffff;
            --text-dim: #a1a1aa;
            --border: rgba(255, 255, 255, 0.05);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            padding: 40px 20px;
            overflow-x: hidden;
        }

        /* Header Tasarımı */
        .header {
            max-width: 1800px;
            margin: 0 auto 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10px;
        }

        .brand h1 {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -1.5px;
            text-transform: uppercase;
        }

        .brand h1 span { color: var(--accent); text-shadow: 0 0 15px var(--accent-glow); }

        .status-pill {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 100px;
            font-size: 0.8rem;
            color: var(--text-dim);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .live-dot {
            width: 8px; height: 8px; background: var(--accent);
            border-radius: 50%; box-shadow: 0 0 10px var(--accent);
            animation: pulse 1.5s infinite;
        }

        /* Izgara Düzeni - Yan Yana 5 Kanal */
        .container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 20px;
            max-width: 1800px;
            margin: 0 auto;
        }

        /* Yayın Kartı ve Popup Büyüme Efekti */
        .stream-card {
            background: var(--card-bg);
            border-radius: 16px;
            border: 1px solid var(--border);
            position: relative;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            z-index: 1;
        }

        .stream-card:hover {
            z-index: 50;
            transform: scale(1.15); /* Kart üzerine gelince büyüme */
            box-shadow: 0 20px 50px rgba(0,0,0,0.8), 0 0 20px var(--accent-glow);
            border-color: var(--accent);
        }

        .media-box {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            border-radius: 16px 16px 0 0;
            overflow: hidden;
        }

        .thumb-img {
            width: 100%; height: 100%; object-fit: cover;
            transition: opacity 0.3s ease;
        }

        .video-container {
            position: absolute; inset: 0;
            opacity: 0; pointer-events: none;
            transition: opacity 0.5s ease;
        }

        .stream-card:hover .video-container {
            opacity: 1; pointer-events: auto;
        }

        .stream-card:hover .thumb-img {
            opacity: 0;
        }

        /* Bilgi Alanı */
        .card-body { padding: 15px; }

        .channel-name {
            display: block; font-weight: 700; font-size: 0.95rem;
            color: var(--text-main); margin-bottom: 4px;
        }

        .stream-title {
            font-size: 0.75rem; color: var(--text-dim);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        .live-badge {
            position: absolute; top: 12px; left: 12px;
            background: var(--accent); color: white;
            font-size: 10px; font-weight: 800; padding: 4px 8px;
            border-radius: 4px; z-index: 5;
        }

        iframe { width: 100%; height: 100%; border: none; }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        /* Mobil ve Tablet Uyumu */
        @media (max-width: 1600px) { .container { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 1200px) { .container { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 800px) { .container { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>

    <header class="header">
        <div class="brand"><h1><span>Eightborn</span> Live</h1></div>
        <div class="status-pill">
            <div class="live-dot"></div>
            <span id="count-info">Sinyal taranıyor...</span>
        </div>
    </header>

    <div class="container" id="stream-grid">
        </div>

    <script>
        const CONFIG = {
            apiKey: 'AIzaSyASaDuIpz0w0ZRVGvjXewLkCO5HDqw9e3I',
            query: 'EightbornV OR "EightbornV Next" OR #eightbornv',
            cacheKey: 'eb_cache_data',
            timeKey: 'eb_cache_time',
            cacheTime: 5 * 60 * 1000 // 5 Dakika
        };

        async function fetchStreams() {
            const grid = document.getElementById('stream-grid');
            const countInfo = document.getElementById('count-info');

            // --- API Kotasını Korumak İçin Cache Kontrolü ---
            const lastFetch = localStorage.getItem(CONFIG.timeKey);
            const cachedData = localStorage.getItem(CONFIG.cacheKey);
            const now = Date.now();

            if (lastFetch && cachedData && (now - lastFetch < CONFIG.cacheTime)) {
                console.log("Veriler Cache'den çekildi (Kota harcanmadı)");
                renderUI(JSON.parse(cachedData));
                return;
            }

            try {
                const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&eventType=live&type=video&q=${encodeURIComponent(CONFIG.query)}&key=${CONFIG.apiKey}&maxResults=20&order=viewCount`;
                const response = await fetch(url);
                const data = await response.json();

                if (data.items) {
                    localStorage.setItem(CONFIG.cacheKey, JSON.stringify(data.items));
                    localStorage.setItem(CONFIG.timeKey, now.toString());
                    renderUI(data.items);
                }
            } catch (err) {
                grid.innerHTML = `<p style="grid-column: 1/-1; text-align: center;">API Limitine takıldı veya internet hatası.</p>`;
            }
        }

        function renderUI(streams) {
            const grid = document.getElementById('stream-grid');
            const countInfo = document.getElementById('count-info');
            grid.innerHTML = '';
            countInfo.innerText = `${streams.length} Kanal Yayında`;

            streams.forEach(stream => {
                const videoId = stream.id.videoId;
                const html = `
                    <div class="stream-card" 
                         onmouseenter="playVideo('${videoId}')" 
                         onmouseleave="stopVideo('${videoId}')" 
                         onclick="window.open('https://youtube.com/watch?v=${videoId}', '_blank')">
                        <div class="media-box">
                            <div class="live-badge">LIVE</div>
                            <img src="${stream.snippet.thumbnails.high.url}" class="thumb-img">
                            <div class="video-container" id="vid-${videoId}"></div>
                        </div>
                        <div class="card-body">
                            <span class="channel-name">${stream.snippet.channelTitle}</span>
                            <p class="stream-title">${stream.snippet.title}</p>
                        </div>
                    </div>
                `;
                grid.insertAdjacentHTML('beforeend', html);
            });
        }

        function playVideo(id) {
            const container = document.getElementById(`vid-${id}`);
            // Sessiz (muted) başlatmak zorunludur yoksa tarayıcı otomatik oynatmaz.
            // Sesi açmak için kullanıcının videoya tıklayıp YouTube'a gitmesi gerekir.
            container.innerHTML = `<iframe src="https://www.youtube.com/embed/${id}?autoplay=1&mute=1&controls=0&modestbranding=1" allow="autoplay"></iframe>`;
        }

        function stopVideo(id) {
            const container = document.getElementById(`vid-${id}`);
            container.innerHTML = ''; // IFrame'i silerek CPU ve Internet kullanımını durdur
        }

        // Başlat
        fetchStreams();
    </script>
</body>
</html>
