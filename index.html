<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EightbornV | Live Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050506;
            --card-bg: #0f0f12;
            --accent: #ff0000;
            --accent-rgb: 255, 0, 0;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 50% -20%, rgba(var(--accent-rgb), 0.15), transparent 50%),
                radial-gradient(circle at 0% 100%, rgba(var(--accent-rgb), 0.05), transparent 30%);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            padding: 40px 20px;
            overflow-x: hidden;
        }

        /* Başlık Alanı */
        .header {
            max-width: 1400px;
            margin: 0 auto 50px;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
        }

        .brand h1 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -2px;
            line-height: 1;
        }

        .brand h1 span {
            color: var(--accent);
            text-shadow: 0 0 20px rgba(var(--accent-rgb), 0.5);
        }

        .brand p {
            color: var(--text-dim);
            font-size: 0.9rem;
            margin-top: 8px;
        }

        .live-indicator {
            background: rgba(var(--accent-rgb), 0.1);
            color: var(--accent);
            padding: 8px 16px;
            border-radius: 100px;
            font-size: 0.8rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid rgba(var(--accent-rgb), 0.2);
        }

        .dot {
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        /* Izgara Düzeni */
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 30px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Kart Tasarımı */
        .stream-card {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            text-decoration: none;
            color: inherit;
            border: 1px solid var(--border);
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
        }

        .stream-card:hover {
            transform: translateY(-10px);
            border-color: rgba(var(--accent-rgb), 0.4);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6), 0 0 20px rgba(var(--accent-rgb), 0.1);
        }

        .thumb-wrap {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            overflow: hidden;
            background: #000;
        }

        .thumb-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: all 0.8s ease;
            filter: saturate(0.8);
        }

        .stream-card:hover .thumb-wrap img {
            transform: scale(1.1) rotate(1deg);
            filter: saturate(1.2);
        }

        /* Hareketli Video Efekti */
        .motion-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(rgba(var(--accent-rgb), 0.1), transparent);
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 2;
        }

        .scanlines {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, transparent 50%, rgba(0,0,0,0.3) 50%);
            background-size: 100% 4px;
            opacity: 0;
            z-index: 3;
        }

        .stream-card:hover .motion-overlay,
        .stream-card:hover .scanlines {
            opacity: 1;
        }

        /* Kart Detayları */
        .card-body {
            padding: 20px;
            position: relative;
        }

        .channel-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .avatar-stub {
            width: 40px;
            height: 40px;
            background: linear-gradient(45deg, var(--accent), #ff6b6b);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.2rem;
        }

        .name-box {
            flex: 1;
        }

        .channel-name {
            display: block;
            font-weight: 700;
            font-size: 1rem;
            color: var(--text-main);
        }

        .status-text {
            font-size: 0.75rem;
            color: var(--accent);
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: 1px;
        }

        .stream-title {
            font-size: 0.9rem;
            color: var(--text-dim);
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            transition: color 0.3s;
        }

        .stream-card:hover .stream-title {
            color: var(--text-main);
        }

        /* Animasyonlar */
        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.5; }
            100% { transform: scale(0.95); opacity: 1; }
        }

        #status-msg {
            grid-column: 1 / -1;
            text-align: center;
            padding: 100px;
            font-size: 1.2rem;
            color: var(--text-dim);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header { flex-direction: column; align-items: flex-start; gap: 20px; }
            .brand h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="brand">
            <h1><span>EIGHTBORN</span> NEXT</h1>
            <p>Canlı yayın takibi ve anlık bildirimler</p>
        </div>
        <div class="live-indicator">
            <div class="dot"></div>
            <span id="count-text">Yükleniyor...</span>
        </div>
    </header>

    <main class="container" id="stream-grid">
        <div id="status-msg">Veri akışı senkronize ediliyor...</div>
    </main>

    <script>
        const API_CONFIG = {
            key: 'AIzaSyASaDuIpz0w0ZRVGvjXewLkCO5HDqw9e3I',
            query: 'EightbornV OR "EightbornV Next" OR #eightbornv OR #eightbornnext',
            cacheDuration: 300000, // 5 dakika
            storageKey: 'eb_next_cache',
            timeKey: 'eb_next_time'
        };

        async function getStreams() {
            const grid = document.getElementById('stream-grid');
            const countText = document.getElementById('count-text');
            
            // Cache Kontrolü
            const cachedTime = localStorage.getItem(API_CONFIG.timeKey);
            const cachedData = localStorage.getItem(API_CONFIG.storageKey);
            const now = Date.now();

            if (cachedTime && cachedData && (now - cachedTime < API_CONFIG.cacheDuration)) {
                console.log("CACHE: Veriler yerel depodan yüklendi.");
                renderStreams(JSON.parse(cachedData));
                return;
            }

            try {
                const endpoint = `https://www.googleapis.com/youtube/v3/search?part=snippet&eventType=live&type=video&q=${encodeURIComponent(API_CONFIG.query)}&key=${API_CONFIG.key}&maxResults=18&order=viewCount`;
                const res = await fetch(endpoint);
                const data = await res.json();

                if (data.items && data.items.length > 0) {
                    localStorage.setItem(API_CONFIG.storageKey, JSON.stringify(data.items));
                    localStorage.setItem(API_CONFIG.timeKey, now.toString());
                    renderStreams(data.items);
                } else {
                    grid.innerHTML = '<div id="status-msg">Şu an aktif yayıncı bulunamadı.</div>';
                    countText.innerText = "0 Yayıncı Aktif";
                }
            } catch (err) {
                grid.innerHTML = '<div id="status-msg">Bağlantı hatası: API kotası dolmuş olabilir.</div>';
            }
        }

        function renderStreams(items) {
            const grid = document.getElementById('stream-grid');
            const countText = document.getElementById('count-text');
            
            grid.innerHTML = '';
            countText.innerText = `${items.length} Yayıncı Aktif`;

            items.forEach(item => {
                const firstLetter = item.snippet.channelTitle.charAt(0).toUpperCase();
                const card = `
                    <a href="https://www.youtube.com/watch?v=${item.id.videoId}" class="stream-card" target="_blank">
                        <div class="thumb-wrap">
                            <div class="motion-overlay"></div>
                            <div class="scanlines"></div>
                            <img src="${item.snippet.thumbnails.high.url}" alt="stream-thumb">
                        </div>
                        <div class="card-body">
                            <div class="channel-header">
                                <div class="avatar-stub">${firstLetter}</div>
                                <div class="name-box">
                                    <span class="channel-name">${item.snippet.channelTitle}</span>
                                    <span class="status-text">Canlı Yayında</span>
                                </div>
                            </div>
                            <p class="stream-title">${item.snippet.title}</p>
                        </div>
                    </a>
                `;
                grid.insertAdjacentHTML('beforeend', card);
            });
        }

        // Başlat ve Zamanlayıcıyı Kur
        getStreams();
        setInterval(getStreams, 60000); // Arka planda her dakika kontrol et (cache süresi dolmadan API'ye gitmez)
    </script>
</body>
</html>
