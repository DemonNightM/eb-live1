<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EightbornV Canlı Yayın Paneli</title>
    <style>
        :root {
            --bg-color: #080808;
            --card-bg: #121212;
            --accent-red: #ff0000;
            --text-main: #ffffff;
            --text-dim: #999;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .header {
            text-align: center;
            padding: 20px 0;
            border-bottom: 2px solid var(--accent-red);
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(255, 0, 0, 0.2);
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid #222;
            border-radius: 12px;
            overflow: hidden;
            transition: 0.3s;
            position: relative;
            text-decoration: none;
            color: inherit;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-red);
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.3);
        }

        .thumb-box {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
        }

        .thumb-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .live-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--accent-red);
            color: white;
            padding: 4px 10px;
            font-weight: bold;
            font-size: 11px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .live-badge::before {
            content: '';
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
            animation: blink 1s infinite;
        }

        .info {
            padding: 15px;
        }

        .channel-name {
            font-size: 1.1rem;
            font-weight: bold;
            color: #fff;
            margin-bottom: 5px;
            display: block;
        }

        .stream-title {
            font-size: 0.9rem;
            color: var(--text-dim);
            height: 2.8em;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0; }
            100% { opacity: 1; }
        }

        #status {
            text-align: center;
            padding: 50px;
            font-size: 1.2rem;
            color: var(--accent-red);
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>EIGHTBORNV NEXT LIVE</h1>
    </div>

    <div id="status">Yayınlar taranıyor...</div>
    <div class="container" id="stream-container"></div>

    <script>
        // --- AYARLAR ---
        const API_KEY = 'YOUR_API_KEY_HERE'; // Google Cloud'dan aldığın API anahtarını buraya yapıştır
        const SEARCH_QUERY = 'EightbornV Next RP canlı'; // Aranacak kelimeler

        async function fetchYouTubeStreams() {
            const container = document.getElementById('stream-container');
            const status = document.getElementById('status');

            if (API_KEY === 'YOUR_API_KEY_HERE') {
                status.innerText = 'Lütfen kodun içindeki API_KEY kısmını güncelleyin!';
                return;
            }

            const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&eventType=live&type=video&q=${encodeURIComponent(SEARCH_QUERY)}&key=${API_KEY}&maxResults=12`;

            try {
                const response = await fetch(url);
                const data = await response.json();

                if (data.items && data.items.length > 0) {
                    status.style.display = 'none';
                    container.innerHTML = '';
                    
                    data.items.forEach(item => {
                        const cardHtml = `
                            <a href="https://www.youtube.com/watch?v=${item.id.videoId}" class="card" target="_blank">
                                <div class="thumb-box">
                                    <div class="live-badge">CANLI</div>
                                    <img src="${item.snippet.thumbnails.high.url}" alt="thumbnail">
                                </div>
                                <div class="info">
                                    <span class="channel-name">${item.snippet.channelTitle}</span>
                                    <p class="stream-title">${item.snippet.title}</p>
                                </div>
                            </a>
                        `;
                        container.insertAdjacentHTML('beforeend', cardHtml);
                    });
                } else {
                    status.innerText = 'Şu an aktif yayın bulunamadı.';
                }
            } catch (error) {
                status.innerText = 'Veri çekilirken bir hata oluştu.';
                console.error(error);
            }
        }

        // Sayfa açıldığında otomatik çalıştır
        fetchYouTubeStreams();
        
        // Her 5 dakikada bir otomatik yenile
        setInterval(fetchYouTubeStreams, 300000);
    </script>
</body>
</html>
